<div class="auth-page">
  <div class="container auth-container">

    <div class="auth-header">
      <h1 class="display-lg">Welcome back</h1>
      <p class="auth-sub">Sign in to TARIPA</p>
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input id="email" class="form-input" type="email"
        [(ngModel)]="email" placeholder="you@example.com"
        (keyup.enter)="login()" />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input id="password" class="form-input" type="password"
        [(ngModel)]="password" placeholder="••••••••"
        (keyup.enter)="login()" />
    </div>

    @if (error()) {
      <div class="alert alert-error">{{ error() }}</div>
    }

    <button class="btn btn-primary btn-full btn-lg" (click)="login()" [disabled]="loading()">
      @if (loading()) { <div class="spinner spinner-sm"></div> }
      Sign In
    </button>

    <p class="auth-switch">Don't have an account? <a routerLink="/register">Create one</a></p>
    <a routerLink="/" class="btn btn-ghost btn-full back-link">← Back to Home</a>

  </div>
</div>
