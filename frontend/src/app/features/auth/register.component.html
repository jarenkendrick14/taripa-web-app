<div class="auth-page">
  <div class="container auth-container">

    <div class="auth-header">
      <h1 class="display-lg">Join TARIPA</h1>
      <p class="auth-sub">Create a free account</p>
    </div>

    <div class="form-group">
      <label class="form-label" for="displayName">Display Name</label>
      <input id="displayName" class="form-input" [(ngModel)]="displayName" placeholder="Your name" />
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input id="email" class="form-input" type="email"
        [(ngModel)]="email" placeholder="you@example.com" />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input id="password" class="form-input" type="password"
        [(ngModel)]="password" placeholder="Min. 8 characters" />
    </div>

    @if (error()) {
      <div class="alert alert-error">{{ error() }}</div>
    }

    <button class="btn btn-primary btn-full btn-lg" (click)="register()" [disabled]="loading()">
      @if (loading()) { <div class="spinner spinner-sm"></div> }
      Create Account
    </button>

    <p class="auth-switch">Already have an account? <a routerLink="/login">Sign in</a></p>
    <a routerLink="/" class="btn btn-ghost btn-full back-link">← Back to Home</a>

  </div>
</div>
